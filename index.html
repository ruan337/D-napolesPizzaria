  <link rel="icon" type="image/png" sizes="16x16"  href="/favicons/favicon-16x16.png">

<meta name="theme-color" content="#ffffff">
  <style>
    :root {
      --bg-a:#ff7a2f;
      --bg-b:#e7353f;
      --text:#fff;
      --whats:#1f9d47;
      --phone:#3c82f6;
      --addr:#8b5cf6;
      --inst:linear-gradient(90deg,#fd1d1d,#fcb045);
    }
    body {
      margin:0; height:100vh; display:grid; place-items:center;
      background:linear-gradient(135deg,var(--bg-a),var(--bg-b));
      font-family:sans-serif; color:var(--text);
    }
    .wrap { text-align:center; }
    .logo {
      width:80%; max-width:300px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-8px)}
    }
    h1 { font-size:1.8rem; margin:1rem 0; }

    .stack { display:grid; gap:14px; width:90%; max-width:400px; margin:0 auto; }

    .btn {
      display:flex; align-items:center; justify-content:center; gap:10px;
      text-decoration:none; color:#fff; font-weight:bold;
      padding:16px; border-radius:12px;
      border:2px solid rgba(255,255,255,0.5); /* borda clara */
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn:hover {
      transform: scale(1.05); /* cresce um pouco */
      box-shadow:0 6px 20px rgba(0,0,0,0.2);
    }
    .btn svg { width:18px; height:18px; }

    .whats { background:var(--whats); }
    .phone { background:var(--phone); padding:12px; }
    .addr { background:var(--addr); padding:12px; }
    .insta { background:var(--inst); padding:12px; }

    footer { margin-top:20px; font-size:12px; color:#ffffffcc; }
  </style>
</head>
